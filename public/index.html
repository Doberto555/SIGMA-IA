<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SIGMA AI</title>
<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  margin: 0;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  max-width: 80%;
}
.user {
  background: #2563eb;
  align-self: flex-end;
}
.bot {
  background: #1e293b;
  align-self: flex-start;
}
#inputArea {
  display: flex;
  padding: 10px;
  background: #1e293b;
}
input {
  flex: 1;
  padding: 10px;
  border-radius: 5px;
  border: none;
}
button {
  padding: 10px;
  margin-left: 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
button:hover { opacity: 0.8; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Écris ton message..." />
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const chat = document.getElementById("chat");
  const message = input.value;
  if (!message) return;

  chat.innerHTML += `<div class="message user">${message}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await response.json();
  chat.innerHTML += `<div class="message bot">${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
